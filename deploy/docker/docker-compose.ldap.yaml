##############################################################
# SigNoz with LDAP Authentication
#
# Usage:
#   docker compose -f docker-compose.yaml -f docker-compose.ldap.yaml up -d
#
# This overlay adds LDAP configuration to the base SigNoz stack.
# After startup, LDAP auth domains are configured via the init-ldap service.
##############################################################
version: "3"

services:
  signoz:
    environment:
      # JWT secret - change this in production!
      - SIGNOZ_TOKENIZER_JWT_SECRET=${SIGNOZ_JWT_SECRET:-change-me-in-production}
      # Root user auto-provisioned on startup (optional, for initial setup)
      - SIGNOZ_USER_ROOT_ENABLED=true
      - SIGNOZ_USER_ROOT_EMAIL=${SIGNOZ_ADMIN_EMAIL:-admin@setyazilim.com}
      - SIGNOZ_USER_ROOT_PASSWORD=${SIGNOZ_ADMIN_PASSWORD:-SetAdmin2024!@}
      - SIGNOZ_USER_ROOT_ORG_NAME=${SIGNOZ_ORG_NAME:-SETYazilim}

  # One-shot service that configures the LDAP auth domain after SigNoz starts
  init-ldap:
    image: curlimages/curl:latest
    container_name: signoz-init-ldap
    depends_on:
      signoz:
        condition: service_healthy
    networks:
      - signoz-net
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for SigNoz API..."
        sleep 5

        # Login to get access token
        echo "Logging in as admin..."
        CONTEXT=$$(curl -sf "http://signoz:8080/api/v2/sessions/context?email=$${SIGNOZ_ADMIN_EMAIL}&ref=http://signoz:8080")
        ORG_ID=$$(echo "$$CONTEXT" | sed 's/.*"id":"\([^"]*\)".*/\1/')
        echo "OrgID: $$ORG_ID"

        TOKEN_RESP=$$(curl -sf -X POST http://signoz:8080/api/v2/sessions/email_password \
          -H 'Content-Type: application/json' \
          -d "{\"email\":\"$${SIGNOZ_ADMIN_EMAIL}\",\"password\":\"$${SIGNOZ_ADMIN_PASSWORD}\",\"orgId\":\"$$ORG_ID\"}")
        TOKEN=$$(echo "$$TOKEN_RESP" | sed 's/.*"accessToken":"\([^"]*\)".*/\1/')

        # Check if LDAP domain already exists
        DOMAINS=$$(curl -sf http://signoz:8080/api/v1/domains -H "Authorization: Bearer $$TOKEN")
        if echo "$$DOMAINS" | grep -q "$${LDAP_EMAIL_DOMAIN}"; then
          echo "LDAP domain $${LDAP_EMAIL_DOMAIN} already exists, skipping."
          exit 0
        fi

        # Create LDAP auth domain
        echo "Creating LDAP auth domain for $${LDAP_EMAIL_DOMAIN}..."
        curl -sf -X POST http://signoz:8080/api/v1/domains \
          -H 'Content-Type: application/json' \
          -H "Authorization: Bearer $$TOKEN" \
          -d "{
            \"name\": \"$${LDAP_EMAIL_DOMAIN}\",
            \"config\": {
              \"ssoEnabled\": true,
              \"ssoType\": \"ldap\",
              \"ldapConfig\": {
                \"host\": \"$${LDAP_HOST}\",
                \"port\": $${LDAP_PORT:-389},
                \"useTLS\": $${LDAP_USE_TLS:-false},
                \"insecureSkipVerify\": $${LDAP_INSECURE_SKIP_VERIFY:-false},
                \"domains\": [$${LDAP_AD_DOMAINS}],
                \"baseDN\": \"$${LDAP_BASE_DN:-}\",
                \"userSearchFilter\": \"$${LDAP_USER_SEARCH_FILTER:-}\",
                \"emailAttribute\": \"$${LDAP_EMAIL_ATTRIBUTE:-}\",
                \"nameAttribute\": \"$${LDAP_NAME_ATTRIBUTE:-}\"
              }
            }
          }"

        echo ""
        echo "LDAP configuration complete!"
        echo "Users can now login with: username@$${LDAP_EMAIL_DOMAIN}"
    environment:
      - SIGNOZ_ADMIN_EMAIL=${SIGNOZ_ADMIN_EMAIL:-admin@setyazilim.com}
      - SIGNOZ_ADMIN_PASSWORD=${SIGNOZ_ADMIN_PASSWORD:-SetAdmin2024!@}
      - LDAP_HOST=${LDAP_HOST:-172.16.1.172}
      - LDAP_PORT=${LDAP_PORT:-389}
      - LDAP_USE_TLS=${LDAP_USE_TLS:-false}
      - LDAP_INSECURE_SKIP_VERIFY=${LDAP_INSECURE_SKIP_VERIFY:-false}
      - LDAP_AD_DOMAINS=${LDAP_AD_DOMAINS:-"SETYAZILIM","SETSOFTWARE"}
      - LDAP_EMAIL_DOMAIN=${LDAP_EMAIL_DOMAIN:-setyazilim.com}
      - LDAP_BASE_DN=${LDAP_BASE_DN:-}
      - LDAP_USER_SEARCH_FILTER=${LDAP_USER_SEARCH_FILTER:-}
      - LDAP_EMAIL_ATTRIBUTE=${LDAP_EMAIL_ATTRIBUTE:-}
      - LDAP_NAME_ATTRIBUTE=${LDAP_NAME_ATTRIBUTE:-}
